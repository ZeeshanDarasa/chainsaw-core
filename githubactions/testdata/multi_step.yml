name: multi_step
on: [push]
jobs:
  reusable:
    uses: my-org/reusable/.github/workflows/ci.yml@v2
  matrix-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
      - uses: aws-actions/configure-aws-credentials@v1
  build:
    runs-on: ubuntu-latest
    steps:
      - name: pre
        run: echo hi
      - uses: actions/cache@v3
