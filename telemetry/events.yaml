    description: First package request in an ecosystem for this org in 24h.
    required: [ecosystem]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: proxy.sbom.ingested
    surface: proxy
    description: SBOM ingested via chainproxy.
    required: []
    optional: [format, components]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: proxy.malware.detected
    surface: proxy
    description: Known-malicious package blocked.
    required: [ecosystem, package_name]
    optional: [indicator_kind]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: proxy.vuln.critical_found
    surface: proxy
    description: Scan found a critical vulnerability in a requested package.
    required: [ecosystem, package_name]
    optional: [cve_id]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: proxy.rollup.hourly
    surface: proxy
    description: Hourly aggregate of passthrough volume per (org, ecosystem, decision).
    required: [ecosystem, decision, count]
    pii: none
    sample_rate: 1.0
    retention: warm

  - name: proxy.health.degraded
    surface: proxy
    description: Circuit breaker opened or closed.
    required: [state]
    optional: [upstream]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: proxy.activation.first_block
    surface: proxy
    description: First blocked install observed for an org — the activation milestone for the "first block in 60 seconds" quickstart funnel. Process-local dedup; cross-replica dupes are tolerated and absorbed by PostHog's first-event-per-user funnel semantics.
    required: [ecosystem, package_name]
    optional: [policy_id, policy_name, is_demo_policy]
    pii: content
    sample_rate: 1.0
    retention: hot
