    required: [tool_name, latency_ms]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: mcp.tool.failed
    surface: mcp
    description: Tool handler returned an error.
    required: [tool_name, error_class]
    optional: [latency_ms]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: mcp.resource.read
    surface: mcp
    description: MCP resource read (doc catalog fetch).
    required: [resource_uri]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: mcp.resource.listed
    surface: mcp
    description: MCP resources/list handler called.
    required: []
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: mcp.suggestion.emitted
    surface: mcp
    description: Suggester callback proposed a next tool.
    required: [suggested_tool]
    optional: [context_tool]
    pii: none
    sample_rate: 1.0
    retention: hot

  - name: mcp.suggestion.followed
    surface: mcp
    description: A previously suggested tool was invoked next.
    required: [tool_name]
    pii: none
    sample_rate: 1.0
    retention: hot

  # ---- CHAINPROXY ----
  - name: proxy.package.blocked
    surface: proxy
    description: Package blocked by policy.
    required: [ecosystem, decision]
    optional: [reason, package_name, sample_rate]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: proxy.package.allowed
    surface: proxy
    description: Package explicitly allowed by a policy hit (not passthrough).
    required: [ecosystem, decision]
    optional: [reason, package_name, sample_rate]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: proxy.package.passthrough
    surface: proxy
    description: Package passed without a policy hit — sampled to 1-5% adaptive.
    required: [ecosystem]
    optional: [package_name, sample_rate]
    pii: content
    sample_rate: 0.05
    retention: hot

  - name: proxy.package.denied
    surface: proxy
    description: Upstream returned 4xx/5xx or package was not found.
    required: [ecosystem, status]
    optional: [reason, package_name]
    pii: content
    sample_rate: 1.0
    retention: hot

  - name: proxy.ecosystem.first_seen
